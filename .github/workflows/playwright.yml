name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Parabank Docker
        run: |
          docker run -d -p 8080:8080 --name parabank parasoft/parabank
          echo "Waiting for Parabank to start..."
          sleep 30

      - name: Wait for Parabank to be ready
        run: |
          for i in {1..20}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/parabank | grep -q "200"; then
              echo "Parabank is ready!"
              break
            fi
            echo "Attempt $i — not ready yet, waiting..."
            sleep 15
          done
      - name: Show Docker logs
        if: always()
        run: docker logs parabank

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Install Playwright browsers — chromium + firefox
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      # Step 5: Run tests
      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          VALID_USERNAME: ${{ secrets.VALID_USERNAME }}
          VALID_PASSWORD: ${{ secrets.VALID_PASSWORD }}
          INVALID_USERNAME: ${{ secrets.INVALID_USERNAME }}
          INVALID_PASSWORD: ${{ secrets.INVALID_PASSWORD }}

      # Step 6: Upload Allure results (always, even if tests fail)
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      # Step 7: Upload Playwright HTML report
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
